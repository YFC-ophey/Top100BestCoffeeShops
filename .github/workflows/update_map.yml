name: Update Map and Deploy Site

on:
  schedule:
    - cron: "0 9 * * 1"
    - cron: "0 9 10-20 2 *"
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest

      - name: Capture geocode baseline
        id: geocode_baseline
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/current_list.json")
          place_ids = 0
          coords = 0
          total = 0
          if path.exists():
            rows = json.loads(path.read_text(encoding="utf-8"))
            total = len(rows)
            place_ids = sum(1 for row in rows if row.get("place_id"))
            coords = sum(1 for row in rows if row.get("lat") is not None and row.get("lng") is not None)

          output = Path(__import__("os").environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
            handle.write(f"total={total}\n")
            handle.write(f"place_id_count={place_ids}\n")
            handle.write(f"coord_count={coords}\n")
          PY

      - name: Scrape-only sync (no API key needed)
        run: |
          python src/main.py scrape-only

      - name: Guard against geocode wipe
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          baseline_place = int(os.environ.get("BASELINE_PLACE", "0") or "0")
          baseline_coord = int(os.environ.get("BASELINE_COORD", "0") or "0")
          rows = json.loads(Path("data/current_list.json").read_text(encoding="utf-8"))
          current_place = sum(1 for row in rows if row.get("place_id"))
          current_coord = sum(1 for row in rows if row.get("lat") is not None and row.get("lng") is not None)

          if baseline_place > 0 and current_place == 0:
            print(
              f"::error::Geocode regression detected: place_id count dropped from {baseline_place} to 0. "
              "Aborting before commit. Run owner-geocode and investigate scrape merge logic."
            )
            sys.exit(1)

          if baseline_coord > 0 and current_coord == 0:
            print(
              f"::error::Geocode regression detected: coord count dropped from {baseline_coord} to 0. "
              "Aborting before commit. Run owner-geocode and investigate scrape merge logic."
            )
            sys.exit(1)

          print(
            f"Geocode guard passed: place_id {baseline_place} -> {current_place}, "
            f"coords {baseline_coord} -> {current_coord}"
          )
          PY
        env:
          BASELINE_PLACE: ${{ steps.geocode_baseline.outputs.place_id_count }}
          BASELINE_COORD: ${{ steps.geocode_baseline.outputs.coord_count }}

      - name: Build static site
        run: |
          python src/main.py build-site

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/current_list.json output/coffee_shops.kml output/coffee_shops.csv site
          git diff --staged --quiet || git commit -m "chore: update coffee shops map data"
          git push

      - name: Rebuild Pages site with browser key when available
        env:
          GOOGLE_MAPS_JS_API_KEY: ${{ secrets.GOOGLE_MAPS_JS_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -n "${GOOGLE_MAPS_JS_API_KEY}${GOOGLE_MAPS_API_KEY}" ]; then
            echo "Google Maps browser key detected. Rebuilding Pages artifact with embedded key."
            EMBED_GOOGLE_MAPS_JS_KEY=1 python src/main.py build-site
          else
            echo "No Google Maps browser key secret configured; deploying static site without live map."
          fi

      - name: Count shops missing place IDs
        id: geocode_gap
        run: |
          MISSING=$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("data/current_list.json").read_text(encoding="utf-8"))
          print(sum(1 for row in data if not row.get("place_id")))
          PY
          )
          echo "missing=$MISSING" >> "$GITHUB_OUTPUT"

      - name: Create owner geocode reminder issue
        if: steps.geocode_gap.outputs.missing != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const missing = ${{ steps.geocode_gap.outputs.missing }};
            const title = `Owner geocode refresh needed (${missing} shops missing place_id)`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            if (openIssues.some((issue) => issue.title === title)) {
              return;
            }
            const body = [
              "Automated reminder from `update_map.yml`.",
              "",
              `Missing place_id count: **${missing}**`,
              "",
              "Run locally with owner key:",
              "```bash",
              "python src/main.py owner-geocode --api-key \"$GOOGLE_MAPS_API_KEY\"",
              "```",
            ].join("\n");
            await github.rest.issues.create({
              owner,
              repo,
              title,
              body
            });

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
